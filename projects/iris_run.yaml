# ==============================
# EPOCH Run Configuration — Iris
# ==============================

project:
  name: "Iris Species Classifier"
  slug: iris

run:
  id: run-20260306-2013
  goal: "Classify iris species based on sepal and petal measurements using rules."
  task_type: rule_based
  max_rounds: 4
  max_retries_per_round: 2

env:
  manager: uv
  path: projects/iris  # uv project directory

evaluation:
  primary_metric: accuracy
  min_delta: 0.01
  deterministic: true
  train_cmd: "python projects/iris/evaluate.py train"
  eval_cmd: "python projects/iris/evaluate.py eval"

git:
  push_to_remote: true
  create_prs: true
  target_branch: develop
