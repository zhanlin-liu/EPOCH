project:
  name: "Sentiment Analysis Prompt Tuner"
  slug: sentiment

run:
  id: run-20260306-1500
  goal: "Optimize prompt for SST-2 sentiment classification (positive/negative)"
  task_type: prompt_tune
  max_rounds: 5
  max_retries_per_round: 1

env:
  manager: uv
  path: "projects/sentiment"

llm:
  model: "gpt-4.1-nano"
  async: true
  concurrency: 12

tune:
  strategy: ["few shots", "chain of thought"]

subset:
  enabled: true
  num_classes: 2
  train_samples_per_class: 10
  eval_samples_per_class: 6

data:
  source: "sst2"
  iibrary: "datasets"

evaluation:
  primary_metric: accuracy
  min_delta: 0.02
  deterministic: false
  train_cmd: "python projects/sentiment/evaluate.py train"
  eval_cmd: "python projects/sentiment/evaluate.py eval"

git:
  push_to_remote: true
  create_prs: true
  target_branch: develop
