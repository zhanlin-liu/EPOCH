project:
  name: "MobileNetV2 MNIST Classifier"
  slug: mnist

run:
  id: run-20260306-1957
  goal: "Fine-tune MobileNetV2 on MNIST dataset to maximize eval accuracy"
  task_type: finetune
  max_rounds: 3
  max_retries_per_round: 1

env:
  manager: uv
  path: "projects/mnist"

ml:
  base_model: mobilenetv2
  framework: pytorch
  seed: 42
  max_train_epochs: 3

tune:
  optimizer: [adam, adamw, sgd]
  learning_rate: [0.0001, 0.01]

subset:
  enabled: true
  num_classes: 10
  train_samples_per_class: 20
  eval_samples_per_class: 6

evaluation:
  primary_metric: accuracy
  min_delta: 0.02
  deterministic: true
  train_cmd: "python projects/mnist/evaluate.py train"
  eval_cmd: "python projects/mnist/evaluate.py eval"

git:
  push_to_remote: true
  create_prs: true
  target_branch: develop
